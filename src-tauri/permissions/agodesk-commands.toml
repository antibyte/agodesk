[[permission]]
identifier = "agodesk-commands"
description = "Allows agodesk credential, desktop, file, tray, and websocket commands."
commands.allow = [
  "store_shared_key",
  "get_shared_key",
  "delete_shared_key",
  "store_gemini_api_key",
  "get_gemini_api_key",
  "delete_gemini_api_key",
  "has_gemini_api_key",
  "collect_host_info",
  "list_displays",
  "list_windows",
  "capture_screen",
  "control_permission_status",
  "inject_input",
  "set_input_approval",
  "reset_desktop_session",
  "get_active_window",
  "get_ui_tree",
  "perform_ui_action",
  "browser_connect",
  "browser_list_tabs",
  "browser_snapshot",
  "browser_action",
  "browser_disconnect",
  "open_external_url",
  "open_temp_file",
  "probe_server_certificate",
  "save_trusted_certificate",
  "get_trusted_certificates",
  "agodesk_connect",
  "agodesk_send",
  "agodesk_disconnect",
  "speech_asr_status",
  "speech_tts_status",
  "speech_download_asr_model",
  "speech_sidecar_ping",
  "speech_sidecar_transcribe",
  "speech_sidecar_synthesize",
  "file_list",
  "file_read",
  "file_write",
  "file_search",
  "file_search_sync_roots",
  "file_search_rescan",
  "pick_folder_path",
  "canonicalize_folder_path",
  "set_minimize_to_tray",
  "update_tray_labels",
  "show_main_window",
  "fetch_server_asset",
  "upload_chat_attachment",
  "integration_embed_open",
  "integration_embed_set_bounds",
  "integration_embed_close"
]
