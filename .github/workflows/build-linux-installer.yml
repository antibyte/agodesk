name: Build Linux Installer (deb / AppImage / rpm)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      features:
        description: 'Cargo features (comma separated)'
        required: false
        default: 'computer-use-sidecar'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # GitHub Actions runners have no FUSE; extract AppImages instead of mounting them.
  APPIMAGE_EXTRACT_AND_RUN: 1

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgdk-pixbuf2.0-dev \
            libfuse2 \
            patchelf \
            build-essential \
            libssl-dev \
            file \
            libx11-dev \
            libxcb1-dev \
            libatspi2.0-dev

      - name: Install deps
        run: npm ci

      - name: Build frontend + sidecar + Linux bundles (deb/appimage/rpm)
        run: npm run build:linux

      - name: Upload Linux packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: agodesk-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
