name: Build Linux Installer (deb / AppImage / rpm)

on:
  workflow_dispatch:
    inputs:
      features:
        description: 'Cargo features (comma separated)'
        required: false
        default: 'computer-use-sidecar'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # GitHub Actions runners have no FUSE; extract AppImages instead of mounting them.
  APPIMAGE_EXTRACT_AND_RUN: 1

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgdk-pixbuf2.0-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libfuse2 \
            pkg-config \
            xvfb \
            patchelf \
            build-essential \
            libssl-dev \
            file \
            libx11-dev \
            libxcb1-dev \
            libatspi2.0-dev

      - name: Install deps
        run: npm ci

      - name: Start virtual display (linuxdeploy / AppImage)
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"

      - name: Build frontend + sidecar + Linux bundles (deb/appimage/rpm)
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run build:linux

      - name: Collect Linux release assets
        run: |
          mkdir -p release-assets/linux
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/deb/*.deb; do
            cp "$f" release-assets/linux/
          done
          for f in src-tauri/target/release/bundle/rpm/*.rpm; do
            cp "$f" release-assets/linux/
          done
          for f in src-tauri/target/release/bundle/appimage/*.AppImage; do
            cp "$f" release-assets/linux/
          done
          for f in src-tauri/target/release/bundle/appimage/*.AppImage.sig; do
            cp "$f" release-assets/linux/
          done
          if [ -z "$(ls -A release-assets/linux)" ]; then
            echo "No Linux packages were produced."
            exit 1
          fi
          ls -la release-assets/linux/

      - name: Upload Linux packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: agodesk-linux
          path: release-assets/linux/*
          retention-days: 30
