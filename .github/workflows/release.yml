name: Release (Windows + Linux + Update Manifest)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APPIMAGE_EXTRACT_AND_RUN: 1

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      signed: ${{ steps.signing.outputs.signed }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install deps
        run: npm ci

      - name: Configure updater signing
        id: signing
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: node scripts/release-signing.mjs configure

      - name: Build frontend + sidecar + NSIS installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ steps.signing.outputs.signed == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ steps.signing.outputs.signed == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        run: npm run build:win

      - name: Collect Windows release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets/windows | Out-Null
          Copy-Item src-tauri/target/release/bundle/nsis/*.exe release-assets/windows/
          if ("${{ steps.signing.outputs.signed }}" -eq "true") {
            Copy-Item src-tauri/target/release/bundle/nsis/*.sig release-assets/windows/
            if (-not (Get-ChildItem release-assets/windows/*.sig)) {
              throw "Missing NSIS .sig updater artifacts after signed build."
            }
          } else {
            Write-Host "Unsigned release: skipping NSIS .sig artifacts."
          }
          Get-ChildItem release-assets/windows

      - name: Upload Windows assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release-assets/windows/*
          retention-days: 7

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgdk-pixbuf2.0-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libfuse2 \
            pkg-config \
            xvfb \
            patchelf \
            build-essential \
            libssl-dev \
            file \
            libx11-dev \
            libxcb1-dev \
            libatspi2.0-dev

      - name: Install deps
        run: npm ci

      - name: Configure updater signing
        id: signing
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: node scripts/release-signing.mjs configure

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"

      - name: Build frontend + sidecar + Linux bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ steps.signing.outputs.signed == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ steps.signing.outputs.signed == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        run: npm run build:linux

      - name: Collect Linux release assets
        run: |
          mkdir -p release-assets/linux
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/deb/*.deb; do cp "$f" release-assets/linux/; done
          for f in src-tauri/target/release/bundle/rpm/*.rpm; do cp "$f" release-assets/linux/; done
          for f in src-tauri/target/release/bundle/appimage/*.AppImage; do cp "$f" release-assets/linux/; done
          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            for f in src-tauri/target/release/bundle/appimage/*.AppImage.sig; do cp "$f" release-assets/linux/; done
          else
            echo "Unsigned release: skipping AppImage .sig artifacts."
          fi
          ls -la release-assets/linux/

      - name: Upload Linux assets
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release-assets/linux/*
          retention-days: 7

  publish:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate latest.json
        if: needs.build-windows.outputs.signed == 'true'
        run: |
          node scripts/generate-update-manifest.mjs \
            --tag "${{ github.ref_name }}" \
            --assets release-assets \
            --repo "${{ github.repository }}" \
            --out release-assets/latest.json

      - name: Publish GitHub Release
        if: needs.build-windows.outputs.signed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: agodesk ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            release-assets/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release (unsigned)
        if: needs.build-windows.outputs.signed != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: agodesk ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          body: |
            > **Hinweis:** Dieses Release wurde ohne Updater-Signaturen veröffentlicht, weil `TAURI_SIGNING_PRIVATE_KEY` in GitHub Secrets fehlt oder ungültig ist. Installer funktionieren; Auto-Update folgt nach Secret-Fix und neuem Tag.
          files: |
            release-assets/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
