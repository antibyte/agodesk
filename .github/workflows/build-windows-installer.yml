name: Build Windows Installer (NSIS setup.exe)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      features:
        description: 'Cargo features (comma separated)'
        required: false
        default: 'computer-use-sidecar'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install deps
        run: npm ci

      - name: Build frontend + sidecar + NSIS installer
        run: npm run build:win

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: agodesk-windows-setup
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          draft: true
          generate_release_notes: true
          overwrite_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
