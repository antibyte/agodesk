name: Build Windows Installer (NSIS setup.exe)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      features:
        description: 'Cargo features (comma separated)'
        required: false
        default: 'computer-use-sidecar'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install deps
        run: npm ci

      - name: Build frontend + sidecar + NSIS installer
        run: npm run build:win
        env:
          # If you want to override features from dispatch:
          # CARGO_FEATURES: ${{ github.event.inputs.features }}
          # (script hardcodes for now; extend ps1 if needed)
          RUSTFLAGS: "-C target-feature=+crt-static" # optional static

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: agodesk-windows-setup
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
